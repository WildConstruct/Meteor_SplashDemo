<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Meteor — Wet-Shader Tuning</title>
    <link rel="stylesheet" href="/src/client/styles/tune.css" />
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>

    <div id="unsupported" hidden>
      <h2>WebGPU is not available</h2>
      <p>This page needs a WebGPU browser (Chrome/Edge 113+, or recent Chromium / iOS 18 Safari).</p>
    </div>

    <button id="panel-toggle" aria-label="Toggle controls">≡ Tune</button>
    <section id="panel" aria-label="Tuning controls">
      <header>
        <strong>Wet-shader tuning</strong>
        <span id="fps" class="muted">—</span>
      </header>
      <div id="sliders"></div>
      <div class="row">
        <button id="play">⏸ Pause</button>
        <button id="reset">Reset look</button>
        <a id="editor-link" href="/app.html">Full editor →</a>
      </div>
      <p class="hint">Water over a <b>dark</b> (left) and <b>light</b> (right) surface, ground in perspective. The full editor is at <code>/app.html</code>.</p>
    </section>

    <!-- The full Meteor editor lives at /app.html; this page is the wet-shader
         tuning harness (build/deploy entry temporarily points here). -->
    <script type="module" src="/src/client/tune.js"></script>
  </body>
</html>
