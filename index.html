<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meteor — Static-Plate Splash Demo (WebGPU)</title>
    <link rel="stylesheet" href="/src/client/styles/meteor.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span class="brand">METEOR</span>
        <span class="tagline">art-directable environmental-interaction VFX · WebGPU</span>
        <div id="scene-picker-mount"></div>
        <div id="project-menu-mount"></div>
        <div id="preset-bar-mount"></div>
      </header>

      <main id="workspace">
        <section id="viewport">
          <canvas id="gpu-canvas"></canvas>
          <svg id="overlay" xmlns="http://www.w3.org/2000/svg"></svg>
          <div id="unsupported" hidden>
            <h2>WebGPU is not available</h2>
            <p>
              This demo requires a browser with WebGPU (Chrome 113+, Edge 113+,
              or a recent Chromium). No WebGL fallback is provided by design.
            </p>
          </div>
        </section>

        <aside id="sidebar">
          <div id="chip-stack-mount"></div>
          <div id="parameter-panel-mount"></div>
          <div id="debug-panel-mount"></div>
        </aside>
      </main>

      <footer id="timeline-mount"></footer>
      <div id="notifications-mount"></div>
    </div>

    <!-- Full Meteor editor/demo. The standalone wet-shader tuning sandbox is at
         tune.html. -->
    <script type="module" src="/src/client/main.js"></script>
  </body>
</html>
