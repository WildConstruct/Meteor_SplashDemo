name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:boundaries
      - run: npm run validate:wcx
      - run: npm run test:unit
      - run: npm run build

  wgsl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install naga-cli
        run: cargo install naga-cli --locked
      - run: node scripts/validate-wgsl.mjs
